name: Update README (stats, wakatime, 3D skyline, activity)

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch:
  repository_dispatch:
    types: [update-readme]
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/update-readme.yml'
      - 'scripts/**'
      - 'README.md'

# Prevent overlapping runs from racing on git push
concurrency:
  group: update-readme
  cancel-in-progress: false

jobs:
  update-readme:
    runs-on: ubuntu-latest
    name: Update Profile README
    permissions:
      contents: write
    env:
      # Surfaced as env so we can gate steps that need extra secrets.
      METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
      WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 1) Tech stack + featured projects (repo analysis) -> edits README in place
      - name: Analyze repositories and update tech stack
        run: python scripts/analyze_repos.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2) Recent activity feed -> injects between <!--START_SECTION:activity--> markers
      - name: Update recent activity
        uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          COMMIT_MSG: '⚡ Auto-update recent activity'
          MAX_LINES: 10

      # 3) WakaTime terminal stats -> injects between <!--START_SECTION:waka--> markers
      #    Requires the WAKATIME_API_KEY repo secret. Skipped gracefully if absent.
      - name: Update WakaTime terminal stats
        if: ${{ env.WAKATIME_API_KEY != '' }}
        uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SECTION_NAME: waka
          SHOW_TIME: 'true'
          SHOW_TOTAL: 'true'
          COMMIT_MESSAGE: '⌨️ Auto-update WakaTime stats'
          TIME_RANGE: last_7_days

      # 4) GitHub stats + top languages as COMMITTED SVGs (no 503, unlike the
      #    public github-readme-stats instance). Requires METRICS_TOKEN (a PAT
      #    with read:user + repo scopes). Falls back to placeholders if absent.
      - name: Generate stats card (metrics)
        if: ${{ env.METRICS_TOKEN != '' }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: generated/metrics.svg
          base: header, activity, community, repositories, metadata
          config_timezone: Africa/Nairobi
          output_action: none

      - name: Generate languages card (metrics)
        if: ${{ env.METRICS_TOKEN != '' }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: generated/metrics-languages.svg
          base: ''
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          output_action: none

      # 5) 3D isometric contribution skyline -> committed SVGs under profile-3d-contrib/
      #    Uses the default GITHUB_TOKEN, so no extra secret is needed.
      - name: Generate 3D contribution skyline
        uses: yoshi389111/github-profile-3d-contrib@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: musiliandrew

      # 6) Single consolidated commit for all generated assets
      - name: Commit generated assets
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md generated profile-3d-contrib 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🔄 Auto-update stats, skyline & activity"
            git push
          fi
